<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palazzo Theater | Private Cinema Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
background:#1B2A4A;
font-family:Inter, sans-serif;
color:#F0F1F3;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}
.container{
width:100%;
max-width:620px;
text-align:center;
}
.logo{
width:460px;
margin-bottom:50px;
display:block;
margin-left:auto;
margin-right:auto;
}
h1{
font-size:36px;
font-weight:400;
letter-spacing:4px;
color:#D4C9B0;
margin-bottom:10px;
}
.subtitle{
color:#D8DDE5;
font-size:15px;
line-height:1.6;
margin-bottom:40px;
}
form{
display:flex;
flex-direction:column;
gap:18px;
}
input{
padding:16px;
border-radius:6px;
border:1px solid #3D3D3D;
background:#0D1520;
color:white;
font-size:14px;
}
input::placeholder{
color:#9BA2AC;
}
.phoneRow{
display:flex;
gap:10px;
}
.prefix{
background:#0D1520;
border:1px solid #3D3D3D;
padding:16px;
border-radius:6px;
min-width:80px;
text-align:center;
color:#D4C9B0;
}
button{
margin-top:10px;
padding:16px;
border:none;
border-radius:6px;
background:#D4C9B0;
color:#1B2A4A;
font-weight:600;
letter-spacing:2px;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
#status{
margin-top:10px;
font-size:13px;
color:#D8DDE5;
}
.footer{
margin-top:40px;
font-size:12px;
color:#8E97A5;
}
.countryPicker{
position:relative;
}
.countrySearch{
width:95%;
padding:16px;
border-radius:6px;
border:1px solid #3D3D3D;
background:#0D1520;
color:white;
font-size:14px;
}
.countrySearch::placeholder{
color:#9BA2AC;
}
.countryDropdown{
position:absolute;
top:calc(100% + 8px);
left:0;
right:0;
max-height:260px;
overflow-y:auto;
background:#0D1520;
border:1px solid #3D3D3D;
border-radius:6px;
display:none;
z-index:10;
text-align:left;
}
.countryDropdown.show{
display:block;
}
.countryDivider{
padding:10px 14px 6px;
font-size:11px;
letter-spacing:1px;
color:#8E97A5;
text-transform:uppercase;
}
.countryOption{
width:100%;
border:none;
background:transparent;
color:white;
padding:12px 14px;
text-align:left;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}
.countryOption:hover,
.countryOption.active{
background:#162235;
}
.countryCode{
color:#D4C9B0;
font-size:13px;
}
</style>
</head>

let activeIndex = -1;

function getSortedCountries(filter = "") {
  const query = filter.trim().toLowerCase();
  const filtered = countries.filter(country =>
    country.name.toLowerCase().includes(query) ||
    country.code.toLowerCase().includes(query)
  );

  const featured = filtered.filter(country => featuredCountries.includes(country.name));
  const rest = filtered.filter(country => !featuredCountries.includes(country.name));
  rest.sort((a, b) => a.name.localeCompare(b.name));
  return { featured, rest };
}

function renderCountryOptions(filter = "") {
  const { featured, rest } = getSortedCountries(filter);
  let html = "";

  if (featured.length) {
    html += `<div class="countryDivider">Popular</div>`;
    html += featured.map(country => `
      <button type="button" class="countryOption" data-country="${country.name}" data-code="${country.code}">
        <span>${country.name}</span>
        <span class="countryCode">${country.code}</span>
      </button>
    `).join("");
  }

  if (rest.length) {
    html += `<div class="countryDivider">All countries</div>`;
    html += rest.map(country => `
      <button type="button" class="countryOption" data-country="${country.name}" data-code="${country.code}">
        <span>${country.name}</span>
        <span class="countryCode">${country.code}</span>
      </button>
    `).join("");
  }

  if (!html) {
    html = `<div class="countryOption" style="cursor:default;opacity:0.72;">No country found</div>`;
  }

  countryDropdown.innerHTML = html;
  activeIndex = -1;
}

function updatePhonePrefix() {
  const code = prefix.dataset.code || "";
  prefix.innerText = code || "+---";
}

function selectCountry(name, code) {
  countrySearch.value = name;
  countryValue.value = name;
  prefix.dataset.code = code;
  updatePhonePrefix();
  countryDropdown.classList.remove("show");
}

function getOptions() {
  return [...countryDropdown.querySelectorAll(".countryOption[data-country]")];
}

function setActiveOption(index) {
  const options = getOptions();
  options.forEach(option => option.classList.remove("active"));
  if (!options.length) return;

  if (index < 0) index = 0;
  if (index >= options.length) index = options.length - 1;

  activeIndex = index;
  options[activeIndex].classList.add("active");
  options[activeIndex].scrollIntoView({ block: "nearest" });
}

countrySearch.addEventListener("focus", () => {
  renderCountryOptions(countrySearch.value);
  countryDropdown.classList.add("show");
});

countrySearch.addEventListener("input", () => {
  countryValue.value = "";
  prefix.dataset.code = "";
  updatePhonePrefix();
  renderCountryOptions(countrySearch.value);
  countryDropdown.classList.add("show");
});

countrySearch.addEventListener("keydown", (event) => {
  const options = getOptions();

  if (!countryDropdown.classList.contains("show")) {
    renderCountryOptions(countrySearch.value);
    countryDropdown.classList.add("show");
  }

  if (event.key === "ArrowDown") {
    event.preventDefault();
    setActiveOption(activeIndex + 1);
  }

  if (event.key === "ArrowUp") {
    event.preventDefault();
    setActiveOption(activeIndex - 1);
  }

  if (event.key === "Enter" && activeIndex >= 0 && options[activeIndex]) {
    event.preventDefault();
    const option = options[activeIndex];
    selectCountry(option.dataset.country, option.dataset.code);
  }

  if (event.key === "Escape") {
    countryDropdown.classList.remove("show");
  }
});

countryDropdown.addEventListener("click", (event) => {
  const option = event.target.closest(".countryOption[data-country]");
  if (!option) return;
  selectCountry(option.dataset.country, option.dataset.code);
});

document.addEventListener("click", (event) => {
  if (!event.target.closest(".countryPicker")) {
    countryDropdown.classList.remove("show");
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  status.innerText = "Sending...";

  const data = new FormData(form);
  data.append("phonePrefix", prefix.innerText);

  try {
    await fetch(SCRIPT_URL,{
      method:"POST",
      body:data,
      mode:"no-cors"
    });

    status.innerText = "Request sent.";
    form.reset();
    prefix.dataset.code = "";
    updatePhonePrefix();
    countryValue.value = "";
  } catch {
    status.innerText = "Error sending request.";
  }
});

renderCountryOptions();
updatePhonePrefix();
</script>
</body>
</html>
