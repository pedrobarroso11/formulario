<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palazzo Theater | Private Cinema Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#1E1E1E;
      --text:#E8E2D8;
      --panel:#252525;
      --panel-2:#2B2B2B;
      --border:#3A3A3A;
      --muted:#BEB7AC;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      font-family:Inter, sans-serif;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:40px;
    }

    .container{
      width:100%;
      max-width:2000px;
      text-align:center;
    }

    .logo{
      width:min(2000px, 100%);
      margin:0 auto 24px auto;
      display:block;
    }

    .logo-tagline{
      color:var(--text);
      font-size:10px;
      letter-spacing:6px;
      margin-bottom:50px;
      opacity:0.95;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    input{
      width:100%;
      padding:16px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      font-size:14px;
      outline:none;
    }

    input::placeholder{
      color:var(--muted);
    }

    input:focus,
    .countrySearch:focus{
      border-color:var(--text);
    }

    .phoneRow{
      display:flex;
      gap:10px;
    }

    .prefix{
      background:var(--panel);
      border:1px solid var(--border);
      padding:16px;
      border-radius:6px;
      min-width:80px;
      text-align:center;
      color:var(--text);
    }

    button{
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:6px;
      background:var(--text);
      color:var(--bg);
      font-weight:600;
      letter-spacing:2px;
      cursor:pointer;
      transition:opacity 0.2s ease, transform 0.2s ease;
    }

    button:hover{
      opacity:0.9;
      transform:translateY(-1px);
    }

    #status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    .footer{
      margin-top:40px;
      font-size:12px;
      color:var(--muted);
    }

    .countryPicker{
      position:relative;
    }

    .countrySearch{
      width:100%;
      padding:16px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      font-size:14px;
      outline:none;
    }

    .countrySearch::placeholder{
      color:var(--muted);
    }

    .countryDropdown{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      right:0;
      max-height:260px;
      overflow-y:auto;
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:6px;
      display:none;
      z-index:10;
      text-align:left;
    }

    .countryDropdown.show{
      display:block;
    }

    .countryDivider{
      padding:10px 14px 6px;
      font-size:11px;
      letter-spacing:1px;
      color:var(--muted);
      text-transform:uppercase;
    }

    .countryOption{
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      padding:12px 14px;
      text-align:left;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
    }

    .countryOption:hover,
    .countryOption.active{
      background:#333333;
    }

    .countryCode{
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width:640px){
      body{
        padding:24px;
      }

      .logo-tagline{
        font-size:10px;
        letter-spacing:4px;
        line-height:1.6;
      }

      .phoneRow{
        flex-direction:column;
      }

      .prefix{
        min-width:unset;
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="palazzo-theatre-transparent.svg" class="logo" alt="Palazzo Theater logo" />

    <div class="logo-tagline">
      Design. Sound. Technology. Cinema.
    </div>

    <form id="customForm">
      <input name="personName" placeholder="Name" required />
      <input name="email" type="email" placeholder="Email" required />

      <div class="countryPicker">
        <input id="countrySearch" class="countrySearch" type="text" placeholder="Country" autocomplete="off" required />
        <input type="hidden" name="country" id="country" />
        <div id="countryDropdown" class="countryDropdown"></div>
      </div>

      <div class="phoneRow">
        <div class="prefix" id="prefix">+---</div>
        <input name="phone" id="phone" placeholder="Phone number" required />
      </div>

      <input name="company" placeholder="Company (optional)" />

      <button type="submit">SUBMIT INQUIRY</button>

      <div id="status"></div>
    </form>

    <div class="footer">
      Palazzo Theater · Private cinema architecture & audiovisual design
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFUdzWluNeJmgU8qW3SzJYwqa6V2nKbp2dbsxOt17gQcIgXV2QDnN4jUcOv22RYuFw/exec";

    const form = document.getElementById("customForm");
    const status = document.getElementById("status");
    const prefix = document.getElementById("prefix");

    const countrySearch = document.getElementById("countrySearch");
    const countryValue = document.getElementById("country");
    const countryDropdown = document.getElementById("countryDropdown");

    const featuredCountries = [
      "Portugal","Spain","France","United Kingdom","United States","United Arab Emirates","Switzerland","Saudi Arabia"
    ];

    const countries = [
      { name:"Afghanistan", code:"+93" }, { name:"Albania", code:"+355" }, { name:"Algeria", code:"+213" }, { name:"Andorra", code:"+376" },
      { name:"Angola", code:"+244" }, { name:"Antigua and Barbuda", code:"+1-268" }, { name:"Argentina", code:"+54" }, { name:"Armenia", code:"+374" },
      { name:"Australia", code:"+61" }, { name:"Austria", code:"+43" }, { name:"Azerbaijan", code:"+994" }, { name:"Bahamas", code:"+1-242" },
      { name:"Bahrain", code:"+973" }, { name:"Bangladesh", code:"+880" }, { name:"Barbados", code:"+1-246" }, { name:"Belarus", code:"+375" },
      { name:"Belgium", code:"+32" }, { name:"Belize", code:"+501" }, { name:"Benin", code:"+229" }, { name:"Bhutan", code:"+975" },
      { name:"Bolivia", code:"+591" }, { name:"Bosnia and Herzegovina", code:"+387" }, { name:"Botswana", code:"+267" }, { name:"Brazil", code:"+55" },
      { name:"Brunei", code:"+673" }, { name:"Bulgaria", code:"+359" }, { name:"Burkina Faso", code:"+226" }, { name:"Burundi", code:"+257" },
      { name:"Cabo Verde", code:"+238" }, { name:"Cambodia", code:"+855" }, { name:"Cameroon", code:"+237" }, { name:"Canada", code:"+1" },
      { name:"Central African Republic", code:"+236" }, { name:"Chad", code:"+235" }, { name:"Chile", code:"+56" }, { name:"China", code:"+86" },
      { name:"Colombia", code:"+57" }, { name:"Comoros", code:"+269" }, { name:"Congo", code:"+242" }, { name:"Costa Rica", code:"+506" },
      { name:"Croatia", code:"+385" }, { name:"Cuba", code:"+53" }, { name:"Cyprus", code:"+357" }, { name:"Czech Republic", code:"+420" },
      { name:"Democratic Republic of the Congo", code:"+243" }, { name:"Denmark", code:"+45" }, { name:"Djibouti", code:"+253" }, { name:"Dominica", code:"+1-767" },
      { name:"Dominican Republic", code:"+1-809" }, { name:"Ecuador", code:"+593" }, { name:"Egypt", code:"+20" }, { name:"El Salvador", code:"+503" },
      { name:"Equatorial Guinea", code:"+240" }, { name:"Eritrea", code:"+291" }, { name:"Estonia", code:"+372" }, { name:"Eswatini", code:"+268" },
      { name:"Ethiopia", code:"+251" }, { name:"Fiji", code:"+679" }, { name:"Finland", code:"+358" }, { name:"France", code:"+33" },
      { name:"Gabon", code:"+241" }, { name:"Gambia", code:"+220" }, { name:"Georgia", code:"+995" }, { name:"Germany", code:"+49" },
      { name:"Ghana", code:"+233" }, { name:"Greece", code:"+30" }, { name:"Grenada", code:"+1-473" }, { name:"Guatemala", code:"+502" },
      { name:"Guinea", code:"+224" }, { name:"Guinea-Bissau", code:"+245" }, { name:"Guyana", code:"+592" }, { name:"Haiti", code:"+509" },
      { name:"Honduras", code:"+504" }, { name:"Hungary", code:"+36" }, { name:"Iceland", code:"+354" }, { name:"India", code:"+91" },
      { name:"Indonesia", code:"+62" }, { name:"Iran", code:"+98" }, { name:"Iraq", code:"+964" }, { name:"Ireland", code:"+353" },
      { name:"Israel", code:"+972" }, { name:"Italy", code:"+39" }, { name:"Jamaica", code:"+1-876" }, { name:"Japan", code:"+81" },
      { name:"Jordan", code:"+962" }, { name:"Kazakhstan", code:"+7" }, { name:"Kenya", code:"+254" }, { name:"Kiribati", code:"+686" },
      { name:"Kuwait", code:"+965" }, { name:"Kyrgyzstan", code:"+996" }, { name:"Laos", code:"+856" }, { name:"Latvia", code:"+371" },
      { name:"Lebanon", code:"+961" }, { name:"Lesotho", code:"+266" }, { name:"Liberia", code:"+231" }, { name:"Libya", code:"+218" },
      { name:"Liechtenstein", code:"+423" }, { name:"Lithuania", code:"+370" }, { name:"Luxembourg", code:"+352" }, { name:"Madagascar", code:"+261" },
      { name:"Malawi", code:"+265" }, { name:"Malaysia", code:"+60" }, { name:"Maldives", code:"+960" }, { name:"Mali", code:"+223" },
      { name:"Malta", code:"+356" }, { name:"Marshall Islands", code:"+692" }, { name:"Mauritania", code:"+222" }, { name:"Mauritius", code:"+230" },
      { name:"Mexico", code:"+52" }, { name:"Micronesia", code:"+691" }, { name:"Moldova", code:"+373" }, { name:"Monaco", code:"+377" },
      { name:"Mongolia", code:"+976" }, { name:"Montenegro", code:"+382" }, { name:"Morocco", code:"+212" }, { name:"Mozambique", code:"+258" },
      { name:"Myanmar", code:"+95" }, { name:"Namibia", code:"+264" }, { name:"Nauru", code:"+674" }, { name:"Nepal", code:"+977" },
      { name:"Netherlands", code:"+31" }, { name:"New Zealand", code:"+64" }, { name:"Nicaragua", code:"+505" }, { name:"Niger", code:"+227" },
      { name:"Nigeria", code:"+234" }, { name:"North Korea", code:"+850" }, { name:"North Macedonia", code:"+389" }, { name:"Norway", code:"+47" },
      { name:"Oman", code:"+968" }, { name:"Pakistan", code:"+92" }, { name:"Palau", code:"+680" }, { name:"Palestine", code:"+970" },
      { name:"Panama", code:"+507" }, { name:"Papua New Guinea", code:"+675" }, { name:"Paraguay", code:"+595" }, { name:"Peru", code:"+51" },
      { name:"Philippines", code:"+63" }, { name:"Poland", code:"+48" }, { name:"Portugal", code:"+351" }, { name:"Qatar", code:"+974" },
      { name:"Romania", code:"+40" }, { name:"Russia", code:"+7" }, { name:"Rwanda", code:"+250" }, { name:"Saint Kitts and Nevis", code:"+1-869" },
      { name:"Saint Lucia", code:"+1-758" }, { name:"Saint Vincent and the Grenadines", code:"+1-784" }, { name:"Samoa", code:"+685" }, { name:"San Marino", code:"+378" },
      { name:"Sao Tome and Principe", code:"+239" }, { name:"Saudi Arabia", code:"+966" }, { name:"Senegal", code:"+221" }, { name:"Serbia", code:"+381" },
      { name:"Seychelles", code:"+248" }, { name:"Sierra Leone", code:"+232" }, { name:"Singapore", code:"+65" }, { name:"Slovakia", code:"+421" },
      { name:"Slovenia", code:"+386" }, { name:"Solomon Islands", code:"+677" }, { name:"Somalia", code:"+252" }, { name:"South Africa", code:"+27" },
      { name:"South Korea", code:"+82" }, { name:"South Sudan", code:"+211" }, { name:"Spain", code:"+34" }, { name:"Sri Lanka", code:"+94" },
      { name:"Sudan", code:"+249" }, { name:"Suriname", code:"+597" }, { name:"Sweden", code:"+46" }, { name:"Switzerland", code:"+41" },
      { name:"Syria", code:"+963" }, { name:"Taiwan", code:"+886" }, { name:"Tajikistan", code:"+992" }, { name:"Tanzania", code:"+255" },
      { name:"Thailand", code:"+66" }, { name:"Timor-Leste", code:"+670" }, { name:"Togo", code:"+228" }, { name:"Tonga", code:"+676" },
      { name:"Trinidad and Tobago", code:"+1-868" }, { name:"Tunisia", code:"+216" }, { name:"Turkey", code:"+90" }, { name:"Turkmenistan", code:"+993" },
      { name:"Tuvalu", code:"+688" }, { name:"Uganda", code:"+256" }, { name:"Ukraine", code:"+380" }, { name:"United Arab Emirates", code:"+971" },
      { name:"United Kingdom", code:"+44" }, { name:"United States", code:"+1" }, { name:"Uruguay", code:"+598" }, { name:"Uzbekistan", code:"+998" },
      { name:"Vanuatu", code:"+678" }, { name:"Vatican City", code:"+379" }, { name:"Venezuela", code:"+58" }, { name:"Vietnam", code:"+84" },
      { name:"Yemen", code:"+967" }, { name:"Zambia", code:"+260" }, { name:"Zimbabwe", code:"+263" }
    ];

    let activeIndex = -1;

    function getSortedCountries(filter = "") {
      const query = filter.trim().toLowerCase();
      const filtered = countries.filter(country =>
        country.name.toLowerCase().includes(query) ||
        country.code.toLowerCase().includes(query)
      );

      const featured = filtered.filter(country => featuredCountries.includes(country.name));
      const rest = filtered.filter(country => !featuredCountries.includes(country.name));
      rest.sort((a, b) => a.name.localeCompare(b.name));
      return { featured, rest };
    }

    function renderCountryOptions(filter = "") {
      const { featured, rest } = getSortedCountries(filter);
      let html = "";

      if (featured.length) {
        html += `<div class="countryDivider">Popular</div>`;
        html += featured.map(country => `
          <button type="button" class="countryOption" data-country="${country.name}" data-code="${country.code}">
            <span>${country.name}</span>
            <span class="countryCode">${country.code}</span>
          </button>
        `).join("");
      }

      if (rest.length) {
        html += `<div class="countryDivider">All countries</div>`;
        html += rest.map(country => `
          <button type="button" class="countryOption" data-country="${country.name}" data-code="${country.code}">
            <span>${country.name}</span>
            <span class="countryCode">${country.code}</span>
          </button>
        `).join("");
      }

      if (!html) {
        html = `<div class="countryOption" style="cursor:default;opacity:0.72;">No country found</div>`;
      }

      countryDropdown.innerHTML = html;
      activeIndex = -1;
    }

    function updatePhonePrefix() {
      const code = prefix.dataset.code || "";
      prefix.innerText = code || "+---";
    }

    function selectCountry(name, code) {
      countrySearch.value = name;
      countryValue.value = name;
      prefix.dataset.code = code;
      updatePhonePrefix();
      countryDropdown.classList.remove("show");
    }

    function getOptions() {
      return [...countryDropdown.querySelectorAll(".countryOption[data-country]")];
    }

    function setActiveOption(index) {
      const options = getOptions();
      options.forEach(option => option.classList.remove("active"));
      if (!options.length) return;

      if (index < 0) index = 0;
      if (index >= options.length) index = options.length - 1;

      activeIndex = index;
      options[activeIndex].classList.add("active");
      options[activeIndex].scrollIntoView({ block: "nearest" });
    }

    countrySearch.addEventListener("focus", () => {
      renderCountryOptions(countrySearch.value);
      countryDropdown.classList.add("show");
    });

    countrySearch.addEventListener("input", () => {
      countryValue.value = "";
      prefix.dataset.code = "";
      updatePhonePrefix();
      renderCountryOptions(countrySearch.value);
      countryDropdown.classList.add("show");
    });

    countrySearch.addEventListener("keydown", (event) => {
      const options = getOptions();

      if (!countryDropdown.classList.contains("show")) {
        renderCountryOptions(countrySearch.value);
        countryDropdown.classList.add("show");
      }

      if (event.key === "ArrowDown") {
        event.preventDefault();
        setActiveOption(activeIndex + 1);
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        setActiveOption(activeIndex - 1);
      }

      if (event.key === "Enter" && activeIndex >= 0 && options[activeIndex]) {
        event.preventDefault();
        const option = options[activeIndex];
        selectCountry(option.dataset.country, option.dataset.code);
      }

      if (event.key === "Escape") {
        countryDropdown.classList.remove("show");
      }
    });

    countryDropdown.addEventListener("click", (event) => {
      const option = event.target.closest(".countryOption[data-country]");
      if (!option) return;
      selectCountry(option.dataset.country, option.dataset.code);
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".countryPicker")) {
        countryDropdown.classList.remove("show");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      status.innerText = "Sending...";

      const data = new FormData(form);
      data.append("phonePrefix", prefix.innerText);

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: data,
          mode: "no-cors"
        });

        status.innerText = "Request sent.";
        form.reset();
        prefix.dataset.code = "";
        updatePhonePrefix();
        countryValue.value = "";
      } catch {
        status.innerText = "Error sending request.";
      }
    });

    renderCountryOptions();
    updatePhonePrefix();
  </script>
</body>
</html>
